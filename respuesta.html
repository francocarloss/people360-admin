<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>People 360 | Respuesta registrada</title>
  <style>
    :root{--ok:#0f9f6e;--error:#dc2626;--ink:#14212b;--muted:#425466;--line:#dbe5ea;--bg:#f5f8fa}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--ink);display:grid;min-height:100vh;place-items:center;padding:22px}
    main{width:min(92vw,520px);background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px 28px;text-align:center;box-shadow:0 18px 45px rgba(15,40,50,.12)}
    .mark{width:58px;height:58px;border-radius:50%;color:#fff;display:grid;place-items:center;margin:0 auto 18px;font-size:24px;font-weight:700}
    h1{font-size:24px;margin:0 0 10px}
    p{font-size:16px;line-height:1.45;margin:0;color:var(--muted)}
    .brand{margin-top:24px;font-size:13px;color:#71818d}
  </style>
</head>
<body>
  <main>
    <div id="mark" class="mark">OK</div>
    <h1 id="title">Respuesta registrada</h1>
    <p id="message">La solicitud fue procesada correctamente.</p>
    <div class="brand">People 360</div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const tone = params.get('tone') === 'error' ? 'error' : 'ok';
    const title = params.get('title') || 'Respuesta registrada';
    const message = params.get('message') || 'La solicitud fue procesada correctamente.';
    const mark = document.getElementById('mark');
    document.getElementById('title').textContent = title;
    document.getElementById('message').textContent = message;
    mark.textContent = tone === 'error' ? '!' : 'OK';
    mark.style.background = tone === 'error' ? '#dc2626' : '#0f9f6e';
  </script>
</body>
</html>
